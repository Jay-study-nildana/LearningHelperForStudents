name: Run tests on push (non-main)

# This workflow runs on any push except pushes to the `main` branch.
# It performs a quick restore and executes the test suite only.
on:
  push:
    # `branches-ignore` ensures pushes to `main` do not trigger this workflow.
    branches-ignore:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore Tests/Tests.csproj

      - name: Run tests
        run: dotnet test Tests/Tests.csproj -c Release --no-restore --verbosity normal
